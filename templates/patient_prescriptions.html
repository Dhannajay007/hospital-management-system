{% extends "base.html" %}

{% block content %}

<div class="card shadow p-4">
    <h3 class="mb-4">My Prescriptions 📄</h3>

    <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Doctor</th>
                    <th>Medicine</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                {% for p in prescriptions %}
                <tr>
                    <td>{{ p[0] }}</td>
                    <td>{{ p[1] }}</td>
                    <td>{{ p[2] }}</td>

                    <td>{{ p[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

</div>

{% endblock %}
