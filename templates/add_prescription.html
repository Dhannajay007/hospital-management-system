{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow p-4">
            <h3 class="mb-4 text-center">Add Prescription 📝</h3>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Medicine Name</label>
                    <input type="text"
                           name="medicine"
                           class="form-control"
                           placeholder="Enter medicine"
                           required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="notes"
                            class="form-control"
                            rows="3"
                            placeholder="Write dosage or instructions here..."></textarea>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        Save Prescription
                    </button>
                </div>

            </form>

        </div>

    </div>
</div>

{% endblock %}
